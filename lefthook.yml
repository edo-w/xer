# https://lefthook.dev/configuration/

pre-commit:
  jobs:
    - run: pnpm fmt
    - run: pnpm lint {staged_files}
      glob: "**/*.{ts,tsx,js,jsx}"
      exclude: "*.config.{js,mjs}"
    - run: pnpm build
    - run: pnpm test
      glob: "**/*.{ts,tsx,js,jsx}"
      exclude: "*.config.{js,mjs}"

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit "$1"

